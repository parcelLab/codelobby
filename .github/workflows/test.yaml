name: Test

on:
  push:
    paths-ignore:
      - ".chart/**"
      - ".github/**"
  workflow_dispatch:

jobs:
  set-repo-name:
    uses: ./.github/workflows/extract-repo-name.yaml

  test:
    runs-on: ubuntu-latest
    needs: set-repo-name
    steps:
      - uses: actions/checkout@v5
        name: Checkout
        with:
          fetch-depth: 1

      # ADD APPROPRIATE TESTING STEPS HERE
      # - name: Set up python
      #   id: setup-python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: "3.12"

      # - name: Install dependencies
      #   env:
      #     PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
      #   run: |
      #     pip3 install -r requirements.txt

      # - name: Test
      #   run: |
      #     python3 test_api.py

  deploy_to_staging:
    if: github.ref == 'refs/heads/main'
    needs:
      - test
      - set-repo-name
    uses: parcelLab/ci/.github/workflows/deployment.yaml@v8
    with:
      appName: ${{ needs.set-repo-name.outputs.repo_name }}
      author: ${{ github.event.pusher.name }}
      chartInAppRepo: true
      description: ${{ toJSON(github.event.head_commit.message) }}
      env: staging
      namespace: infra
      ref: ${{ github.ref }}
      versionKey: microservice.image.tag
    secrets:
      repoAccessToken: ${{ secrets.REPO_ACCESS_TOKEN }}

  deploy_to_test:
    if: github.ref == 'refs/heads/main'
    needs:
      - test
      - set-repo-name
    uses: parcelLab/ci/.github/workflows/deployment.yaml@v8
    with:
      appName: ${{ needs.set-repo-name.outputs.repo_name }}
      author: ${{ github.event.pusher.name }}
      chartInAppRepo: true
      description: ${{ toJSON(github.event.head_commit.message) }}
      env: test
      namespace: infra
      ref: ${{ github.ref }}
      versionKey: microservice.image.tag
    secrets:
      repoAccessToken: ${{ secrets.REPO_ACCESS_TOKEN }}

  deploy_to_prod:
    if: github.ref_type == 'tag'
    needs:
      - test
      - set-repo-name
    uses: parcelLab/ci/.github/workflows/deployment.yaml@v8
    with:
      appName: ${{ needs.set-repo-name.outputs.repo_name }}
      author: ${{ github.event.pusher.name }}
      chartInAppRepo: true
      description: ${{ toJSON(github.event.head_commit.message) }}
      env: prod
      namespace: infra
      ref: ${{ github.ref }}
      versionKey: microservice.image.tag
    secrets:
      repoAccessToken: ${{ secrets.REPO_ACCESS_TOKEN }}
